<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0099BC"/>
      <stop offset="100%" stop-color="#0078D4"/>
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- 日历顶部横条 -->
  <rect x="5" y="4" width="22" height="7" rx="2" fill="rgba(255,255,255,0.2)"/>

  <!-- 日历圆点（顶部装饰） -->
  <circle cx="10" cy="7.5" r="1.2" fill="white"/>
  <circle cx="15" cy="7.5" r="1.2" fill="white"/>
  <circle cx="20" cy="7.5" r="1.2" fill="white"/>

  <!-- 日历网格线 -->
  <line x1="5" y1="15" x2="27" y2="15" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <line x1="5" y1="20" x2="27" y2="20" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <line x1="5" y1="25" x2="27" y2="25" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <line x1="12.5" y1="11" x2="12.5" y2="27" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <line x1="20" y1="11" x2="20" y2="27" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>

  <!-- 选中日期高亮 -->
  <rect x="13.5" y="16" width="6" height="4" rx="1.5" fill="white" opacity="0.9"/>

  <!-- 对勾（表示待办完成） -->
  <path d="M15 18.5 L16.5 20 L19 16.5" stroke="#0078D4" stroke-width="1.2" stroke-linecap="round"
        stroke-linejoin="round" fill="none"/>
</svg>
